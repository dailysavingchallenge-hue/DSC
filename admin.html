<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | DSCSaving</title>
    <link rel="icon" type="image/png" href="dsc_logo.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill.js for Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1; --dark: #0f172a; --dark-light: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444;
            --success: #10b981;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--text-main); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Login Screen */
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--dark-light); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; font-weight: 500; }
        .input-field { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: inherit; box-sizing: border-box; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(99, 102, 241, 0.3); }
        .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), #8b5cf6); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 1rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }
        
        /* Admin Dashboard */
        #adminDashboard { display: none; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .card { background: var(--dark-light); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        
        /* 📌 UPDATED: Editor Styles for Advanced Toolbar */
        .grid-2 { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 768px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
        
        #editor-container { height: 450px; background: white; color: black; border-radius: 0 0 8px 8px; font-size: 1rem; font-family: inherit; }
        .ql-toolbar { background: #f1f5f9; border-radius: 8px 8px 0 0; border-color: #cbd5e1 !important; }
        .ql-container { border-color: #cbd5e1 !important; border-radius: 0 0 8px 8px; }
        
        /* Make Editor Boxes (Blockquote) look nice in Admin Panel too */
        .ql-editor blockquote { 
            border-left: 4px solid var(--primary); 
            background-color: #f8fafc; 
            padding: 10px 15px; 
            margin: 10px 0; 
            border-radius: 4px; 
            color: #334155; 
            font-style: italic; 
        }
        
        /* Table Styles */
        .posts-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        .posts-table th, .posts-table td { padding: 15px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .posts-table th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; font-weight: 600; }
        .action-icon { cursor: pointer; margin-right: 15px; font-size: 1.1rem; transition: 0.3s; padding: 5px; border-radius: 5px; background: rgba(255,255,255,0.05); }
        .action-icon.edit { color: var(--success); }
        .action-icon.edit:hover { background: rgba(16, 185, 129, 0.2); }
        .action-icon.delete { color: var(--danger); }
        .action-icon.delete:hover { background: rgba(239, 68, 68, 0.2); }
        
        #heroPreview { width: 100%; height: 250px; background: rgba(0,0,0,0.5); margin-top: 15px; border-radius: 8px; background-size: cover; background-position: center; display: none; border: 2px dashed rgba(255,255,255,0.2); }
        .note-text { font-size: 0.8rem; color: #fbbf24; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <!-- 🔐 LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-box">
            <h2 style="margin-bottom: 5px;">Admin Login</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">Enter your admin credentials.</p>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="adminEmail" class="input-field" placeholder="admin@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPassword" class="input-field" placeholder="••••••••">
            </div>
            <button class="btn" onclick="loginAdmin()" id="loginBtn">Login</button>
            <p id="loginError" style="color: var(--danger); font-size: 0.85rem; margin-top: 15px; display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 5px; border: 1px solid rgba(239, 68, 68, 0.3);"></p>
        </div>
    </div>

    <!-- 🛠 ADMIN DASHBOARD -->
    <div id="adminDashboard" class="container">
        <div class="header">
            <h2><i class="fas fa-tools text-primary"></i> DSC CMS Dashboard</h2>
            <button class="btn" style="width: auto; background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px;" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <!-- Create / Edit Post Form -->
        <div class="card">
            <h3 id="formTitle" style="margin-bottom: 20px; color: var(--primary-light); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Write New Article</h3>
            <input type="hidden" id="editPostId" value="">
            
            <div class="grid-2">
                <div class="input-group">
                    <label>Article Title</label>
                    <input type="text" id="postTitle" class="input-field" placeholder="Enter full title here...">
                </div>
                <div class="input-group">
                    <label>Language</label>
                    <select id="postLang" class="input-field" style="cursor: pointer;">
                        <option value="en">English (EN)</option>
                        <option value="si">Sinhala (SIN)</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>SEO Title (Optional)</label>
                    <input type="text" id="postSeoTitle" class="input-field" placeholder="Optimized title for Google">
                </div>
                <div class="input-group">
                    <label>Meta Description (Optional)</label>
                    <input type="text" id="postMetaDesc" class="input-field" placeholder="Short description for search results">
                </div>
            </div>

            <div class="input-group">
                <label>Hero Image (Main Image)</label>
                <input type="file" id="postHeroFile" class="input-field" accept="image/*" onchange="previewHeroImage(event)" style="padding: 10px;">
                <div id="heroPreview"></div>
                <input type="hidden" id="existingHeroUrl" value="">
            </div>

            <div class="input-group" style="margin-top: 30px;">
                <label style="font-size: 1rem; color: white;">Article Content</label>
                <span class="note-text" style="margin-bottom: 10px;"><i class="fas fa-info-circle"></i> Use the Quote icon (") to put text inside a nice Box. Use the A icon for text color.</span>
                <!-- 📌 Quill Editor Container -->
                <div id="editor-container"></div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; border-top: 1px dashed rgba(255,255,255,0.1); padding-top: 20px;">
                <button class="btn" style="width: 150px; background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);" onclick="resetForm()">Clear / Cancel</button>
                <button class="btn" style="width: 200px;" id="publishBtn" onclick="savePost()"><i class="fas fa-paper-plane"></i> Publish Post</button>
            </div>
        </div>

        <!-- Existing Posts List -->
        <div class="card">
            <h3 style="margin-bottom: 15px;">Published Articles</h3>
            <div style="overflow-x: auto;">
                <table class="posts-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Language</th>
                            <th>Date</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postsTableBody">
                        <tr><td colspan="4" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // =========================================
        // 📌 FIREBASE INIT
        // =========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDo_Z1pawT4IB_KaoLdo0Yl2YV5gt27S3U", 
            authDomain: "dailysavingchallenge-b7f58.firebaseapp.com",
            projectId: "dailysavingchallenge-b7f58", 
            storageBucket: "dailysavingchallenge-b7f58.firebasestorage.app",
            messagingSenderId: "936731731201", 
            appId: "1:936731731201:web:bb3e841e7664b805102700",
            databaseURL: "https://dailysavingchallenge-b7f58-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const database = firebase.database();
        const storage = firebase.storage();

        // 🔴 CHANGE THIS TO YOUR ADMIN EMAIL!
        const ADMIN_EMAIL = "dailysavingchallenge@gmail.com";

        // =========================================
        // 📌 ADVANCED QUILL EDITOR INIT
        // =========================================
        let quill;
        document.addEventListener("DOMContentLoaded", () => {
            // Full Toolbar exactly like Blogger/Word
            const toolbarOptions = [
                [{ 'font': [] }],
                [{ 'header': [1, 2, 3, 4, 5, 6, false] }],
                [{ 'color': [] }, { 'background': [] }],          // Font Color & Highlight Background
                ['bold', 'italic', 'underline', 'strike'],        // Toggled buttons
                ['blockquote', 'code-block'],                     // Box (Quote) and Code Block
                [{ 'list': 'ordered'}, { 'list': 'bullet' }, { 'indent': '-1'}, { 'indent': '+1' }], // Lists & Indents
                [{ 'align': [] }],                                // Text Alignment
                ['link', 'image', 'video'],                       // Media
                ['clean']                                         // Remove formatting
            ];

            quill = new Quill('#editor-container', {
                theme: 'snow',
                placeholder: 'Type your amazing article here...',
                modules: {
                    toolbar: toolbarOptions
                }
            });
        });

        // =========================================
        // 📌 AUTHENTICATION LOGIC
        // =========================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                if(user.email === ADMIN_EMAIL) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminDashboard').style.display = 'block';
                    loadAdminPosts();
                } else {
                    showError("Unauthorized Access. You are not the Admin.");
                    auth.signOut();
                }
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminDashboard').style.display = 'none';
            }
        });

        function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const pass = document.getElementById('adminPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            
            if(!email || !pass) { showError("Please enter email and password."); return; }
            if(email !== ADMIN_EMAIL) { showError("Only the Admin email is allowed."); return; }

            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Authenticating...`; 
            btn.disabled = true; err.style.display = 'none';
            
            auth.signInWithEmailAndPassword(email, pass).catch(error => {
                showError(error.message);
                btn.innerHTML = "Login"; btn.disabled = false;
            });
        }

        function logoutAdmin() {
            auth.signOut();
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            err.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ` + msg;
            err.style.display = 'block';
        }

        // =========================================
        // 📌 POST MANAGEMENT LOGIC
        // =========================================
        let selectedFile = null;

        function previewHeroImage(event) {
            selectedFile = event.target.files[0];
            const preview = document.getElementById('heroPreview');
            if(selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                preview.style.backgroundImage = `url('${url}')`;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        async function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const lang = document.getElementById('postLang').value;
            const seoTitle = document.getElementById('postSeoTitle').value.trim();
            const metaDesc = document.getElementById('postMetaDesc').value.trim();
            const content = quill.root.innerHTML;
            const editId = document.getElementById('editPostId').value;
            let existingHero = document.getElementById('existingHeroUrl').value;

            // Basic Validation
            if(!title) { alert("Please enter the Article Title!"); return; }
            if(content === "<p><br></p>" || content.trim() === "") { alert("Article content cannot be empty!"); return; }

            const btn = document.getElementById('publishBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving to Firebase...`;
            btn.disabled = true;

            try {
                let heroUrl = existingHero;

                // 1. Upload image to Storage if a new one is selected
                if(selectedFile) {
                    const fileName = `hero_${Date.now()}_${selectedFile.name}`;
                    const storageRef = storage.ref('articles/' + fileName);
                    const uploadTask = await storageRef.put(selectedFile);
                    heroUrl = await uploadTask.ref.getDownloadURL();
                }

                // 2. Prepare Data for Database
                const postData = {
                    title: title,
                    language: lang,
                    seoTitle: seoTitle,
                    metaDesc: metaDesc,
                    heroImage: heroUrl,
                    content: content,
                    updatedAt: Date.now()
                };

                // 3. Save to Realtime Database
                if(editId) {
                    // Only update specific fields, don't touch the original timestamp
                    await database.ref('articles/' + editId).update(postData);
                    alert("Post Updated Successfully!");
                } else {
                    // If it's a new post, add the original timestamp
                    postData.timestamp = Date.now();
                    await database.ref('articles').push(postData);
                    alert("Post Published Successfully!");
                }

                resetForm();
                loadAdminPosts();
            } catch(e) {
                console.error(e);
                alert("Upload Error: " + e.message + "\n\nMake sure your Firebase Storage Rules are set correctly to allow writes by the Admin.");
            }

            btn.innerHTML = `<i class="fas fa-paper-plane"></i> Publish Post`;
            btn.disabled = false;
        }

        function loadAdminPosts() {
            database.ref('articles').once('value').then(snapshot => {
                const data = snapshot.val();
                const tbody = document.getElementById('postsTableBody');
                tbody.innerHTML = '';

                if(!data) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">No articles found. Write your first post above!</td></tr>';
                    return;
                }

                // Convert object to array and sort by newest first
                const posts = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.timestamp - a.timestamp);

                posts.forEach(post => {
                    const dateStr = new Date(post.timestamp).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
                    const langBadge = post.language === 'en' ? '<span style="color:#3b82f6; font-weight:700;">EN</span>' : '<span style="color:#f59e0b; font-weight:700;">SIN</span>';
                    
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:600; color: #e2e8f0;">${post.title}</td>
                            <td>${langBadge}</td>
                            <td style="color: #94a3b8;">${dateStr}</td>
                            <td style="text-align: right;">
                                <i class="fas fa-edit action-icon edit" onclick="editPost('${post.id}')" title="Edit Article"></i>
                                <i class="fas fa-trash action-icon delete" onclick="deletePost('${post.id}')" title="Delete Article"></i>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function editPost(id) {
            database.ref('articles/' + id).once('value').then(snapshot => {
                const post = snapshot.val();
                if(post) {
                    document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> Edit Article';
                    document.getElementById('editPostId').value = id;
                    document.getElementById('postTitle').value = post.title || '';
                    document.getElementById('postLang').value = post.language || 'en';
                    document.getElementById('postSeoTitle').value = post.seoTitle || '';
                    document.getElementById('postMetaDesc').value = post.metaDesc || '';
                    
                    document.getElementById('existingHeroUrl').value = post.heroImage || '';
                    const preview = document.getElementById('heroPreview');
                    if(post.heroImage) {
                        preview.style.backgroundImage = `url('${post.heroImage}')`;
                        preview.style.display = 'block';
                    } else {
                        preview.style.display = 'none';
                    }

                    // Load content into Quill editor
                    quill.root.innerHTML = post.content || '';
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this article forever? This cannot be undone.")) {
                database.ref('articles/' + id).remove().then(() => {
                    // Note: This deletes the DB record, but doesn't delete the image from Storage to save API calls.
                    // You can manually delete images from Firebase Console periodically if needed.
                    alert("Article deleted successfully.");
                    loadAdminPosts();
                }).catch(e => alert("Error: " + e.message));
            }
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = "Write New Article";
            document.getElementById('editPostId').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postLang').value = 'en';
            document.getElementById('postSeoTitle').value = '';
            document.getElementById('postMetaDesc').value = '';
            document.getElementById('postHeroFile').value = '';
            document.getElementById('existingHeroUrl').value = '';
            document.getElementById('heroPreview').style.display = 'none';
            selectedFile = null;
            quill.root.innerHTML = '';
        }
    </script>
</body>
</html>
