<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | DSCSaving</title>
    <link rel="icon" type="image/png" href="dsc_logo.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill.js for Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --primary: #6366f1; --dark: #0f172a; --dark-light: #1e293b;
            --text-main: #f8fafc; --text-muted: #94a3b8; --danger: #ef4444;
            --success: #10b981;
        }
        body { font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--text-main); margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Login Screen */
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: var(--dark-light); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .input-field { width: 100%; padding: 12px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-family: inherit; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #4f46e5; }
        
        /* Admin Dashboard */
        #adminDashboard { display: none; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 30px; }
        .card { background: var(--dark-light); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 30px; }
        
        /* Editor Styles */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        #editor-container { height: 350px; background: white; color: black; border-radius: 0 0 8px 8px; }
        .ql-toolbar { background: #f1f5f9; border-radius: 8px 8px 0 0; }
        
        /* Table Styles */
        .posts-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .posts-table th, .posts-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .posts-table th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; }
        .action-icon { cursor: pointer; margin-right: 15px; font-size: 1.1rem; transition: 0.3s; }
        .action-icon.edit { color: var(--primary); }
        .action-icon.delete { color: var(--danger); }
        
        #heroPreview { width: 100%; height: 200px; background: rgba(0,0,0,0.5); margin-top: 10px; border-radius: 8px; background-size: cover; background-position: center; display: none; }
    </style>
</head>
<body>

    <!-- 🔐 LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px;">Enter your admin credentials.</p>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="adminEmail" class="input-field" placeholder="admin@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="adminPassword" class="input-field" placeholder="••••••••">
            </div>
            <button class="btn" onclick="loginAdmin()" id="loginBtn">Login</button>
            <p id="loginError" style="color: var(--danger); font-size: 0.85rem; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <!-- 🛠 ADMIN DASHBOARD -->
    <div id="adminDashboard" class="container">
        <div class="header">
            <h2><i class="fas fa-tools"></i> CMS Dashboard</h2>
            <button class="btn" style="width: auto; background: var(--danger);" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>

        <!-- Create / Edit Post Form -->
        <div class="card">
            <h3 id="formTitle">Write New Article</h3>
            <input type="hidden" id="editPostId" value="">
            
            <div class="grid-2">
                <div class="input-group">
                    <label>Article Title</label>
                    <input type="text" id="postTitle" class="input-field" placeholder="Enter title here...">
                </div>
                <div class="input-group">
                    <label>Language</label>
                    <select id="postLang" class="input-field">
                        <option value="en">English (EN)</option>
                        <option value="si">Sinhala (SIN)</option>
                    </select>
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>Category</label>
                    <input type="text" id="postCategory" class="input-field" placeholder="e.g. Finance, Tips">
                </div>
                <div class="input-group">
                    <label>Tags (Comma separated)</label>
                    <input type="text" id="postTags" class="input-field" placeholder="money, saving, future">
                </div>
            </div>

            <div class="grid-2">
                <div class="input-group">
                    <label>SEO Title</label>
                    <input type="text" id="postSeoTitle" class="input-field" placeholder="Optimized title for Google">
                </div>
                <div class="input-group">
                    <label>Meta Description</label>
                    <input type="text" id="postMetaDesc" class="input-field" placeholder="Short description for search results">
                </div>
            </div>

            <div class="input-group">
                <label>Hero Image (Main Image)</label>
                <input type="file" id="postHeroFile" class="input-field" accept="image/*" onchange="previewHeroImage(event)">
                <div id="heroPreview"></div>
                <input type="hidden" id="existingHeroUrl" value="">
            </div>

            <div class="input-group">
                <label>Article Content</label>
                <div id="editor-container"></div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px;">
                <button class="btn" style="width: 150px; background: var(--text-muted);" onclick="resetForm()">Clear / Cancel</button>
                <button class="btn" style="width: 150px;" id="publishBtn" onclick="savePost()"><i class="fas fa-paper-plane"></i> Publish Post</button>
            </div>
        </div>

        <!-- Existing Posts List -->
        <div class="card">
            <h3>Published Articles</h3>
            <div style="overflow-x: auto;">
                <table class="posts-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Language</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="postsTableBody">
                        <tr><td colspan="5" style="text-align:center;">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // =========================================
        // 📌 FIREBASE INIT
        // =========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDo_Z1pawT4IB_KaoLdo0Yl2YV5gt27S3U", 
            authDomain: "dailysavingchallenge-b7f58.firebaseapp.com",
            projectId: "dailysavingchallenge-b7f58", 
            storageBucket: "dailysavingchallenge-b7f58.firebasestorage.app",
            messagingSenderId: "936731731201", 
            appId: "1:936731731201:web:bb3e841e7664b805102700",
            databaseURL: "https://dailysavingchallenge-b7f58-default-rtdb.firebaseio.com" 
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); 
        const database = firebase.database();
        const storage = firebase.storage();

        // Admin Email allowed to access (Change this if needed)
        const ADMIN_EMAIL = "dailysavingchallenge@gmail.com";

        // Initialize Quill Editor
        let quill;
        document.addEventListener("DOMContentLoaded", () => {
            quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        ['blockquote', 'code-block'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        [{ 'align': [] }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ]
                }
            });
        });

        // =========================================
        // 📌 AUTHENTICATION LOGIC
        // =========================================
        auth.onAuthStateChanged((user) => {
            if (user) {
                if(user.email === ADMIN_EMAIL) {
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminDashboard').style.display = 'block';
                    loadAdminPosts();
                } else {
                    showError("Unauthorized Access. Not an admin.");
                    auth.signOut();
                }
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('adminDashboard').style.display = 'none';
            }
        });

        function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const pass = document.getElementById('adminPassword').value;
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('loginError');
            
            if(!email || !pass) { showError("Please enter email and password."); return; }
            if(email !== ADMIN_EMAIL) { showError("Unauthorized email."); return; }

            btn.innerText = "Loading..."; btn.disabled = true; err.style.display = 'none';
            
            auth.signInWithEmailAndPassword(email, pass).catch(error => {
                showError(error.message);
                btn.innerText = "Login"; btn.disabled = false;
            });
        }

        function logoutAdmin() {
            auth.signOut();
        }

        function showError(msg) {
            const err = document.getElementById('loginError');
            err.innerText = msg;
            err.style.display = 'block';
        }

        // =========================================
        // 📌 POST MANAGEMENT LOGIC
        // =========================================
        let selectedFile = null;

        function previewHeroImage(event) {
            selectedFile = event.target.files[0];
            const preview = document.getElementById('heroPreview');
            if(selectedFile) {
                const url = URL.createObjectURL(selectedFile);
                preview.style.backgroundImage = `url('${url}')`;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        async function savePost() {
            const title = document.getElementById('postTitle').value.trim();
            const lang = document.getElementById('postLang').value;
            const category = document.getElementById('postCategory').value.trim();
            const tags = document.getElementById('postTags').value.trim();
            const seoTitle = document.getElementById('postSeoTitle').value.trim();
            const metaDesc = document.getElementById('postMetaDesc').value.trim();
            const content = quill.root.innerHTML;
            const editId = document.getElementById('editPostId').value;
            let existingHero = document.getElementById('existingHeroUrl').value;

            if(!title || content === "<p><br></p>") {
                alert("Title and Content are required!"); return;
            }

            const btn = document.getElementById('publishBtn');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving...`;
            btn.disabled = true;

            try {
                let heroUrl = existingHero;

                // Upload image if a new one is selected
                if(selectedFile) {
                    const fileName = `hero_${Date.now()}_${selectedFile.name}`;
                    const storageRef = storage.ref('articles/' + fileName);
                    const uploadTask = await storageRef.put(selectedFile);
                    heroUrl = await uploadTask.ref.getDownloadURL();
                }

                const postData = {
                    title: title,
                    language: lang,
                    category: category,
                    tags: tags,
                    seoTitle: seoTitle,
                    metaDesc: metaDesc,
                    heroImage: heroUrl,
                    content: content,
                    timestamp: editId ? undefined : Date.now(), // keep old timestamp if editing
                    updatedAt: Date.now()
                };

                if(editId) {
                    // Update existing
                    await database.ref('articles/' + editId).update(postData);
                    alert("Post Updated Successfully!");
                } else {
                    // Create new
                    await database.ref('articles').push(postData);
                    alert("Post Published Successfully!");
                }

                resetForm();
                loadAdminPosts();
            } catch(e) {
                console.error(e);
                alert("Error: " + e.message);
            }

            btn.innerHTML = `<i class="fas fa-paper-plane"></i> Publish Post`;
            btn.disabled = false;
        }

        function loadAdminPosts() {
            database.ref('articles').once('value').then(snapshot => {
                const data = snapshot.val();
                const tbody = document.getElementById('postsTableBody');
                tbody.innerHTML = '';

                if(!data) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No articles found.</td></tr>';
                    return;
                }

                // Sort by timestamp desc
                const posts = Object.keys(data).map(k => ({id: k, ...data[k]})).sort((a,b) => b.timestamp - a.timestamp);

                posts.forEach(post => {
                    const dateStr = new Date(post.timestamp).toLocaleDateString();
                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight:600;">${post.title}</td>
                            <td>${post.language.toUpperCase()}</td>
                            <td>${post.category || '-'}</td>
                            <td>${dateStr}</td>
                            <td>
                                <i class="fas fa-edit action-icon edit" onclick="editPost('${post.id}')" title="Edit"></i>
                                <i class="fas fa-trash action-icon delete" onclick="deletePost('${post.id}')" title="Delete"></i>
                            </td>
                        </tr>
                    `;
                });
            });
        }

        function editPost(id) {
            database.ref('articles/' + id).once('value').then(snapshot => {
                const post = snapshot.val();
                if(post) {
                    document.getElementById('formTitle').innerText = "Edit Article";
                    document.getElementById('editPostId').value = id;
                    document.getElementById('postTitle').value = post.title || '';
                    document.getElementById('postLang').value = post.language || 'en';
                    document.getElementById('postCategory').value = post.category || '';
                    document.getElementById('postTags').value = post.tags || '';
                    document.getElementById('postSeoTitle').value = post.seoTitle || '';
                    document.getElementById('postMetaDesc').value = post.metaDesc || '';
                    
                    document.getElementById('existingHeroUrl').value = post.heroImage || '';
                    const preview = document.getElementById('heroPreview');
                    if(post.heroImage) {
                        preview.style.backgroundImage = `url('${post.heroImage}')`;
                        preview.style.display = 'block';
                    } else {
                        preview.style.display = 'none';
                    }

                    quill.root.innerHTML = post.content || '';
                    window.scrollTo(0, 0);
                }
            });
        }

        function deletePost(id) {
            if(confirm("Are you sure you want to delete this article forever?")) {
                database.ref('articles/' + id).remove().then(() => {
                    alert("Deleted successfully.");
                    loadAdminPosts();
                }).catch(e => alert("Error: " + e.message));
            }
        }

        function resetForm() {
            document.getElementById('formTitle').innerText = "Write New Article";
            document.getElementById('editPostId').value = '';
            document.getElementById('postTitle').value = '';
            document.getElementById('postLang').value = 'en';
            document.getElementById('postCategory').value = '';
            document.getElementById('postTags').value = '';
            document.getElementById('postSeoTitle').value = '';
            document.getElementById('postMetaDesc').value = '';
            document.getElementById('postHeroFile').value = '';
            document.getElementById('existingHeroUrl').value = '';
            document.getElementById('heroPreview').style.display = 'none';
            selectedFile = null;
            quill.root.innerHTML = '';
        }
    </script>
</body>
</html>
