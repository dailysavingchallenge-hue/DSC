<!DOCTYPE html>
<html lang="si">
<head>

    <title>About Us - Daily Saving Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<body>
    <div class="bg-animation"></div>
    <div id="app-wrapper" style="display: flex; max-width: 800px; padding-top: 40px; min-height: 100vh;">
        <div class="main-content-flex">
            <button class="back-to-hub-btn" onclick="window.location.href='index.html'" style="width: fit-content; margin-bottom: 20px; text-decoration: none;">

            <div class="settings-card" style="text-align: center; padding: 30px 20px;">
                <img src="dsc_logo.png" style="width: 70px; height: 70px; border-radius:50%; margin-bottom:10px; border:2px solid var(--primary-light);" onerror="this.src='https://via.placeholder.com/70?text=DSC'">
                <h3 style="border:none; margin-bottom:10px; color:var(--text-primary);">අපි ගැන (About Us)</h3>
                <p style="font-size:0.9rem; color:var(--text-secondary); margin-bottom:20px; line-height: 1.7;">ඔබේ අනාගතය සුරක්ෂිත කර ගැනීම සඳහා දිනපතා කුඩා මුදලක් හෝ ඉතිරි කිරීමේ පුරුද්දක් ඇති කිරීම මෙහි ප්‍රධාන අරමුණයි.</p>
            </div>

            <div class="settings-card" style="padding: 20px;">
                <h3 style="text-align:center; border:none; margin-bottom:20px; color:var(--primary-light);"><i class="fab fa-facebook"></i> අපගේ Facebook පිටුව</h3>
                <a href="https://web.facebook.com/profile.php?id=61590623947927" target="_blank" class="fb-link-btn">
                    <i class="fab fa-facebook-f" style="font-size: 1.2rem;"></i> <span>Facebook පිටුවට පිවිසෙන්න</span>
                </a>
            </div>
            
            <div class="settings-card" style="padding: 20px;">
                <h3 style="text-align:center; border:none; margin-bottom:15px; color:var(--accent);">
                    <i class="fas fa-envelope"></i> අදහස් දක්වන්න
                </h3>
                <a href="mailto:dailysavingchallenge@gmail.com" class="action-btn primary" style="width: 100%; justify-content: center; text-decoration: none;">
                    <i class="fas fa-paper-plane"></i> Email මගින් සම්බන්ධ වන්න
                </a>

        </div>
        
        <div class="global-footer" style="margin-top: 20px;">
            <div class="footer-text">&copy; 2026 Daily Saving Challenge<br>සියලුම හිමිකම් ඇවිරිණි.</div>
